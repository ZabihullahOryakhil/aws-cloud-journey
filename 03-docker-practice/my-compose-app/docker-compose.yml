version: '3.9'

services:
  web:
    build:
      context: .
      dockerfile: dockerfile
    container_name: webapp
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    volumes:
      - .:/app
    restart: on-failure

  redis:
    image: redis:7-alpine
    container_name: redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  redis_data:
