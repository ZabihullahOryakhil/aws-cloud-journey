AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Layer - Role and Instance Profile for EC2

Parameters:
  EnvironmentName:
    Type: String

  BucketArn:
    Type: String
    Description: ARN of the S3 bucket from Storage Stack


Resourcces:
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2010-10-17'
        Statement:
          - Effect: Allow
            Principle:
              Service: ec2.amazonaws.com
            Action: sts.AssumeRole

      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Ref BucketArn
                  - !Sub "${BucketArn}/*"
  
  EC2InstanceProfile:
    Type: AWS::IAM::EC2InstanceProfile
    Properties:
      Roles:
      - !Ref EC2InstanceProfile


Outputs:
  InstanceProfileName:
    Value: !Ref EC2InstanceProfile