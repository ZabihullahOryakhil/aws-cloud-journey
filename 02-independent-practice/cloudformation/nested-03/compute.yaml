AWSTemplateFormatVersion: '2010-09-09'
Description: Compute Layer - Creating the actual compute resources

Parameters:
  EnvironmentName:
    Type: String
    Default: dev



  InstanceType:
    Type: String
    Default: t2.micro
    AllowedValues: [t3.micro, t3.small, t2.micro]

  
  SubnetId:
    Type: String

  
  SecurityGroupId:
    Type: String

  InstanceProfileName:
    Type: String

  Resources:
    WebServer:
      Type: AWS::EC2::Instance
      Properties:
        InstanceType: !Ref InstanceType

        ImageId: !Sub "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}"
        SubnetId: !Ref SubnetId
        SecurityGroupIds:
          - !Ref SecurityGroupId

        IamInstanceProfile: !Ref InstanceProfileName

        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            dnf update -y

            dnf install -y httpd
            systemctl start httpd
            systemctl enable httpd

            echo "<h1>Hello From ${EnvironmentName} Environment</h1>" > /var/www/html/index.html
            echo "<h2>Munir Miasi is the <strong>GAYEST PERSON EVER</strong></h2>" >> /var/www/html/index.html

            echo "Instance is ready" > /var/log/userdata.log

        Tags:
          - Key: Name
            Value: !Sub "${EnvironmentName}-web-server"
          - Key: Environment
            Value: !Ref EnvironmentName
          - Key: Application
            Value: DemoApp


Outputs:
  InstanceId:
    Value: !Ref WebServer
    Export:
      Name: !Sub "${EnvironmentName}-WebServerInstanceId"

  PublicIP:
    Value: !GetAtt WebServer.PublicIp
    Export:
      Name: !Sub "${EnvironmentName}-WebServerPublicIP"
  
  WebURL:
    Value: !Sub
      - "http://${PublicIp}"
      - PublicIp: !GetAtt WebServer.PublicIp
    Export:
      Name: !Sub "${EnvironmentName}-WebServerURL"


