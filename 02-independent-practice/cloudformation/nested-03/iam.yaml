AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Layer - Managing Identity and Access Management resources.

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  
  BucketArn:
    Type: String


Resources:
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole

      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !Ref BucketArn
                  - !Sub "${BucketArn}/*"



      Tags:
      - Key: Name
        Value: !Sub "${EnvironmentName}-ec2-role"

      - Key: Environment
        Value: !Ref EnvironmentName



  EC2InstanceProfile:
      Type: AWS::IAM::InstanceProfile
      Properties:
        Roles:
          - !Ref EC2InstanceRole
        Tags:
          - Key: Name
            Value: !Sub "${EnvironmentName}-ec2-instance-profile"

Outputs:
  InstanceProfileName:
    Value: !Ref EC2InstanceProfile
    Export:
      Name: !Sub "${EnvironmentName}-EC2InstanceProfile"

  EC2RoleArn:
    Value: !GetAtt EC2InstanceRole.Arn
    Export:
      Name: !Sub "${EnvironmentName}-EC2RoleArn"