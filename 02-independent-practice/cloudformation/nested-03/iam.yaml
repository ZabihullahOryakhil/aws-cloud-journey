AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Layer - Managing Identity and Access Management resources.

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
  BucketArn:
    Type: String

Resources:
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole

      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Ref BucketArn
                  - !Sub "${BucketArn}/*"

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

Outputs:
  InstanceProfileName:
    Value: !Ref EC2InstanceProfile
    Export:
      Name: !Sub "${EnvironmentName}-EC2InstanceProfile"