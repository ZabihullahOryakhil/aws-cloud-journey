AWSTemplateFormatVersion: '2010-09-09'
Description: Computer Layer - EC2 Instance

Parameters:
  EnvironmentName:
    String

  InstanceType:
    Type: String
    Default: t2.micro

  SubnetId:
    Type: String

  SecurityGroup:
    Type: String
  
  InstanceProfileArn:
    Type: String


Mappings:
  RegionAMI:
    us-east-1:
      AMI: ami-0c02fb55956c7d316
    us-west-2:
      AMI: ami-0e34e7b9ca0ace12d


Resources:
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [RegionAMI, !Ref AWS::Region, AMI]
      SubnetId: !Ref SubnetId
      IamInstanceProfile: !Ref InstanceProfileArn
      SecurityGroupIds:
        - !Ref SecurityGroupId
      
      Tags:
        - key: Name
          Value: !Sub "${EnvironmentName}-Server"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
          echo "<h1>${EnvironmentName} Server</h1>
          <p>Welcome to Zabihullah's First nested CloudFormation Stack</p>" \
          > /var/www/html/index.html

Outputs:
  InstanceId:
    Value: !Ref EC2Instance

  PublicIP:
    Value: !GetAtt EC2Instance.PublicIP

  WebURL:
    Value: !Sub "http://${EC2Instance.PublicIP}"