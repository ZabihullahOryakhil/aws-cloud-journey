AWSTemplateFormatVersion: '2010-09-09'
Description: launch a simple EC2 for use with testing VPCs
Parameters:
  ImageID:
    Type: String
    Default: ami-08e0c6efff118ceba
  SubnetID:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-09bf4170e92519597
  myVPC:
    Type: AWS::EC2::VPC::Id
    Default: vpc-0a6a74ed8011a5ace
Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow http to client host
      VpcId: !Ref myVPC
      SecurityGroupIngress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref ImageID
      InstanceType: t3.micro
      SubnetId: !Ref SubnetID
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
