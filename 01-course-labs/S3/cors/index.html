<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Architecture Command Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Playwrite+AU+SA:wght@100..400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --surface: rgba(17, 24, 39, 0.7);
            --border: rgba(56, 189, 248, 0.2);
            --primary: #38bdf8;
            --secondary: #a855f7;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* Fixed: Corrected matching font fallback name */
            font-family: "Playwrite AU SA", cursive;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Grid Overlay */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: linear-gradient(to right, rgba(56, 189, 248, 0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(56, 189, 248, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg);
            animation: gridMove 20s linear infinite;
            z-index: 1;
        }

        /* Glassmorphism Dashboard Terminal */
        .dashboard {
            position: relative;
            z-index: 2;
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 50px;
            max-width: 800px;
            width: 90%;
            box-shadow: 0 0 50px rgba(56, 189, 248, 0.15);
            transform: translateY(0px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dashboard:hover {
            border-color: rgba(168, 85, 247, 0.4);
            box-shadow: 0 0 60px rgba(168, 85, 247, 0.2);
            transform: translateY(-5px);
        }

        /* Terminal Window Control Bars */
        .terminal-header {
            display: flex;
            gap: 8px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .dot.red { background: #ef4444; }
        .dot.yellow { background: #f59e0b; }
        .dot.green { background: #10b981; }

        /* Typography & Custom Animations */
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary); /* Fixed: Removed transparent background clip clash */
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        .glitch-text {
            position: relative;
            display: inline-block;
        }

        p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 35px;
        }

        /* Status Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            transition: background 0.3s ease;
        }

        .metric-card:hover {
            background: rgba(56, 189, 248, 0.05);
        }

        .metric-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .metric-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--text-main);
        }

        /* Cyberpunk Button Core */
        .btn-container {
            display: flex;
            justify-content: center;
        }

        .cyber-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 15px 35px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }

        .cyber-btn:hover {
            background: var(--primary);
            color: var(--bg);
            box-shadow: 0 0 25px var(--primary);
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 40px; }
        }

        @media (max-width: 600px) {
            .dashboard { padding: 30px 20px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <main class="dashboard">
        <div class="terminal-header">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        
        <header>
            <h1 class="glitch-text">OPERATOR // ZABIHULLAH_ORYAKHIL</h1>
        </header>

        <section>
            <p>Cloud Engineer specializing in secure multi-account AWS architecture solutions and automated infrastructure deployment protocols.</p>
        </section>

        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-label">Deployment Mode</div>
                <div class="metric-value">Static Website</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Server Origin</div>
                <div class="metric-value">AWS S3</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Security Check</div>
                <div class="metric-value" style="color: #10b981;">Passed</div>
            </div>
        </div>

        <div class="btn-container"> 
            <button class="cyber-btn" onclick="alert('System secure. Operational boundaries functional.')">Initialize Link</button> 
</div> 
</main> 

<script type="text/javascript"> 
  const xhr = new XMLHttpRequest(); 
  xhr.open("POST", "https://l7m0nxxmp7.execute-api.us-east-1.amazonaws.com/prod/Hello", true); 
  xhr.setRequestHeader("Content-Type", "application/json"); 
  
  xhr.onreadystatechange = function() { 
    if (xhr.readyState === XMLHttpRequest.DONE) {
      if (xhr.status === 200) { 
        // Fixed: Use xhr.responseText instead of this.responseText
        const results = JSON.parse(xhr.responseText); 
        console.log(results); 
      } else {
        console.error("API Error Status:", xhr.status);
      }
    } 
  }; 
  
  xhr.send(""); 
</script> 
</body>

</html>
